name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Derive Android version from tag
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" != *+* ]]; then
            echo "Release tag must be v<version>+<build-number>, for example v1.0.1+2." >&2
            exit 1
          fi

          build_name="${version%%+*}"
          build_number="${version##*+}"
          if [[ ! "$build_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ || ! "$build_number" =~ ^[0-9]+$ ]]; then
            echo "Release tag must be v<major>.<minor>.<patch>+<numeric-build-number>." >&2
            exit 1
          fi

          pubspec_version="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          if [[ "$version" != "$pubspec_version" ]]; then
            echo "Release tag v$version must match pubspec.yaml version $pubspec_version." >&2
            exit 1
          fi

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        shell: bash
        env:
          QSO_RELEASE_KEYSTORE_BASE64: ${{ secrets.QSO_RELEASE_KEYSTORE_BASE64 }}
        run: |
          : "${QSO_RELEASE_KEYSTORE_BASE64:?Missing QSO_RELEASE_KEYSTORE_BASE64 secret}"
          echo "$QSO_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build signed release APK
        env:
          QSO_RELEASE_STORE_FILE: release.keystore
          QSO_RELEASE_STORE_PASSWORD: ${{ secrets.QSO_RELEASE_STORE_PASSWORD }}
          QSO_RELEASE_KEY_ALIAS: ${{ secrets.QSO_RELEASE_KEY_ALIAS }}
          QSO_RELEASE_KEY_PASSWORD: ${{ secrets.QSO_RELEASE_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}"

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
